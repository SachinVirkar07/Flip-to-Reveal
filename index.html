<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fun Picker Game</title>

<style>
/* 🌌 BACKGROUND */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;
  background: radial-gradient(circle at center, #020617 0%, #000 100%);
}

/* Neon grid */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background-image:
    linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: moveGrid 15s linear infinite;
  z-index: -2;
}

@keyframes moveGrid {
  0% { transform: translate(0,0); }
  100% { transform: translate(50px,50px); }
}

/* Floating dots */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(34,197,94,0.2) 2px, transparent 2px);
  background-size: 100px 100px;
  animation: floatDots 10s linear infinite;
  z-index: -1;
}

@keyframes floatDots {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100px); }
}

h1 {
  padding: 15px;
  font-size: 30px;
  text-shadow: 0 0 10px #22c55e;
}

#timer {
  margin-top: -10px;
  font-size: 18px;
  color: #a7f3d0;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

/* CARD */
.card {
  perspective: 1000px;
}

/* INNER */
.card-inner {
  position: relative;
  width: 100%;
  height: 130px;
  transform-style: preserve-3d;
  transition: transform 0.6s, box-shadow 0.3s;
  cursor: pointer;
  border-radius: 15px;
}

/* Hover glow */
.card-inner:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(34,197,94,0.8);
}

/* Press effect */
.card:active .card-inner {
  transform: scale(0.95);
}

/* Flip */
.card.flipped .card-inner {
  transform: rotateY(180deg);
}

/* SIDES */
.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  backface-visibility: hidden;
  font-size: 15px;
}

/* Front */
.card-front {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* Back */
.card-back {
  background: linear-gradient(135deg, #22c55e, #4ade80);
  color: black;
  transform: rotateY(180deg);
  box-shadow: 0 0 20px rgba(34,197,94,0.8);
}

/* ✨ Reveal animation */
.card.flipped .card-back {
  animation: revealFlash 0.4s ease;
}

@keyframes revealFlash {
  0% { transform: scale(0.8) rotateY(180deg); opacity: 0; }
  50% { transform: scale(1.1) rotateY(180deg); }
  100% { transform: scale(1) rotateY(180deg); opacity: 1; }
}

/* 🌟 RARE CARDS */
.card.rare .card-front {
  border: 2px solid gold;
  box-shadow: 0 0 15px gold;
}

.card.rare .card-back {
  background: linear-gradient(135deg, gold, orange);
  box-shadow: 0 0 25px gold;
}

/* Sparkle */
.card.rare .card-inner::after {
  content: "✨";
  position: absolute;
  top: 5px;
  right: 8px;
  font-size: 18px;
  animation: sparkle 1.5s infinite;
}

@keyframes sparkle {
  0%,100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}
</style>
</head>

<body>

<h1>🎲 Fun Picker Game</h1>
<h3 id="timer">⏳ Next shuffle in: 300s</h3>

<div class="grid" id="grid"></div>

<script>
const topics = [
  "🎥 Movie Night :- Bollywood 🍿",
  "🎥 Movie Night :- Hollywood / International 🍿",
  "🎥 Movie Night :- Anime 🍿",
  "🎬 Webseries :- Hindi 📺",
  "🎬 Webseries :- English 📺",
  "🎬 Webseries :- Anime 📺",
  "📚 Book Reading 📖",
  "🎮 Game Time 🎯",
  "🔬 Explore Together",
  "▶️ Youtube Music Night 🎧",
  "▶️ Stand-up Comedy / Singing 🎤",
  "▶️ Food & Travel Vlogs 🌍🍜"
];

const grid = document.getElementById("grid");

/* 🔊 Sounds */
const flipSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
const rareSound = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");

/* Shuffle */
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

/* Render */
function renderGrid() {
  grid.innerHTML = "";
  const shuffled = shuffle([...topics]);

  // pick rare cards
  const rareIndexes = new Set();
  while (rareIndexes.size < 2) {
    rareIndexes.add(Math.floor(Math.random() * shuffled.length));
  }

  shuffled.forEach((topic, index) => {
    const card = document.createElement("div");
    card.className = "card";

    if (rareIndexes.has(index)) {
      card.classList.add("rare");
    }

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">❓ Tap</div>
        <div class="card-back">${topic}</div>
      </div>
    `;

    card.onclick = () => {
      const flipped = card.classList.toggle("flipped");

      flipSound.currentTime = 0;
      flipSound.play();

      if (flipped && card.classList.contains("rare")) {
        rareSound.currentTime = 0;
        rareSound.play();
      }

      if (navigator.vibrate) {
        navigator.vibrate(30);
      }
    };

    grid.appendChild(card);
  });
}

/* Initial */
renderGrid();

/* ⏳ Timer */
let timeLeft = 300;
const timerEl = document.getElementById("timer");

function updateTimer() {
  timerEl.innerText = `⏳ Next shuffle in: ${timeLeft}s`;
  timeLeft--;

  if (timeLeft < 0) {
    renderGrid();
    timeLeft = 300;
  }
}

setInterval(updateTimer, 1000);
</script>

</body>
</html>
